<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Kalí Tattoo Studio</title>
	<link rel="stylesheet" type="text/css" href="./css/estilos.css">
	<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
	<link rel="icon" type="image/png" href="./img/logo-kali-fondo-negro.JPG">
</head>
<body>
	<header class="header" id="arriba">
		<div class="logo">
			<a href="./inicio.html"><img src="./img/logo-kali.png" alt="logo-kali"></a>
		</div>
		<nav class="header-nav">
			<a href="./inicio.html">Inicio</a>
			<a href="./galeria.html">Galería</a>
			<a href="./contacto.html" class="activo">Contacto</a>
		</nav>
		<a href="https://wa.me/34622337513" target="_blank" class="whatsapp-svg"><img src="./img/logo-whatsapp.svg"></a>
	</header>

	<div class="contacto">
		<h2>Contacto</h2><br>
		<p>Rellena este formulario y nos pondremos en contacto contigo</p>
		<form action="#" method="post" class="formulario">
			<label for="nombre">Nombre completo</label>
			<input type="text" name="nombre" id="nombre" required>
			<label for="email">Correo electrónico</label>
			<input type="email" name="email" id="email" required>
			<label for="telefono">Teléfono</label>
			<input type="telefono" name="telefono" id="telefono" required>
			<label for="selector">Tipo de tatuaje</label>
			<select name="selector" id="selector">
				<option value="realismo">Realismo</option>
				<option value="blackwork">Blackwork</option>
				<option value="fineline">FineLine</option>
				<option value="Anime">Anime</option>
			</select>
			<p>Tamaño aproximado</p>
			<div class="formulario-radio">
			<input type="radio" name="pequeño" id="pequeño">
			<label for="pequeño">Pequeño (1h aprox)</label>

			<input type="radio" name="mediano" id="mediano">
			<label for="mediano">Media sesión (4h aprox)</label>

			<input type="radio" name="grande" id="grande">
			<label for="grande">Sesión completa (8h aprox)</label>

			<input type="radio" name="proyecto" id="proyecto">
			<label for="proyecto">Proyecto grande (Varias citas)</label>

			</div>

			<div class="formulario-checkbox">
			<input type="checkbox" name="condiciones" id="condiciones" required>
			<label for="condiciones">Acepto las condiciones</label>
			</div>

			<div class="formulario-boton">
			<button>Enviar</button>
			</div>

		</form>
	</div>

	<footer class="pie">
		<div class="pie-arriba">
			<p>Volver <a href="#arriba">arriba</a></p>
		</div>
		<div class="pie-text">
			<p>&copy; 2026 Kalí Tattoo Studio — Todos los derechos reservados</p>
		</div>
		<div class="pie-redes">
			<a href="https://www.instagram.com/kali_tattoo.studio/" target="_blank"><img src="./img/logo-instagram.svg" alt="instagram"></a>
			<a href="https://wa.me/34622337513" target="_blank"><img src="./img/logo-whatsapp.svg" alt="whatsapp"></a>
		</div>
	</footer>
</body>
</html>
